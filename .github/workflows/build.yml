name: Android CI

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to publish the rolling release below

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK (zipped CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FortniteCloudSync-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Publish the APK to a rolling "android-latest" release so it can be
      # installed directly from a stable link (no zip, no extraction):
      #   https://github.com/<owner>/<repo>/releases/download/android-latest/app-debug.apk
      # Only on direct pushes (not pull requests).
      - name: Publish rolling debug release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest Android build (debug)
          prerelease: true
          body: |
            Automatically built from `${{ github.ref_name }}` (${{ github.sha }}).
            Tap **app-debug.apk** below on your phone to install or update in place.
          files: app/build/outputs/apk/debug/app-debug.apk

name: Android Release

# Auto-publishes a GitHub Release whenever the versionName in
# app/build.gradle.kts doesn't yet have a matching tag. Bump the version, merge
# to main, and this cuts the release (creates the tag, builds + attaches the
# signed APKs). Can also be run manually via the Actions tab.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: ver
        run: |
          VERSION=$(grep -oE 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will release v$VERSION."
          fi

      - name: Set up JDK 17
        if: steps.ver.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.12
        if: steps.ver.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Gradle
        if: steps.ver.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create local.properties
        if: steps.ver.outputs.exists == 'false'
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APKs
        if: steps.ver.outputs.exists == 'false'
        run: |
          gradle assembleRelease
          gradle assembleDebug

      - name: Stage APKs
        if: steps.ver.outputs.exists == 'false'
        run: |
          cp "$(find app/build/outputs/apk/release -name '*.apk' | head -1)" \
             "FortniteCloudSync-v${{ steps.ver.outputs.version }}-release.apk"
          cp "$(find app/build/outputs/apk/debug -name '*.apk' | head -1)" \
             "FortniteCloudSync-v${{ steps.ver.outputs.version }}-debug.apk"

      - name: Create tag and GitHub Release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "Fortnite Cloud Sync v${{ steps.ver.outputs.version }}"
          body_path: CHANGELOG.md
          # Hyphenated versions (e.g. 1.0.1-beta1) are pre-releases.
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          files: |
            FortniteCloudSync-v${{ steps.ver.outputs.version }}-release.apk
            FortniteCloudSync-v${{ steps.ver.outputs.version }}-debug.apk

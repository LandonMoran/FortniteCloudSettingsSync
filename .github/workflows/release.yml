name: Android Release

# Triggered by version tags: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ---------------------------------------------------------------
      # Optional: decode the keystore stored as a base64 secret so the
      # release build is signed.  Add these four secrets to your repo
      # (Settings → Secrets → Actions) to enable signed releases:
      #
      #   KEYSTORE_BASE64     — base64 of your .jks / .keystore file
      #                         (run: base64 -w 0 release.keystore)
      #   KEYSTORE_PASSWORD   — store password
      #   KEY_ALIAS           — key alias inside the keystore
      #   KEY_PASSWORD        — key password
      #
      # Without these secrets the release APK is unsigned; the debug APK
      # (which uses the auto-generated debug key) is always installable.
      # ---------------------------------------------------------------
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
            echo "KEYSTORE_FILE=/tmp/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Locate APKs
        id: apks
        run: |
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEBUG_APK=$(find app/build/outputs/apk/debug   -name "*.apk" | head -1)
          echo "release=$RELEASE_APK" >> "$GITHUB_OUTPUT"
          echo "debug=$DEBUG_APK"     >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename APKs for release
        run: |
          cp "${{ steps.apks.outputs.release }}" \
             "FortniteCloudSync-${{ steps.apks.outputs.tag }}-release.apk"
          cp "${{ steps.apks.outputs.debug }}" \
             "FortniteCloudSync-${{ steps.apks.outputs.tag }}-debug.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fortnite Cloud Sync ${{ steps.apks.outputs.tag }}"
          generate_release_notes: true
          files: |
            FortniteCloudSync-${{ steps.apks.outputs.tag }}-release.apk
            FortniteCloudSync-${{ steps.apks.outputs.tag }}-debug.apk
